<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - InfinitePay Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-left">
        <div class="logo-icon">
          <img src="pay_logo.png" alt="InfinitePay Analytics" class="logo-img">
        </div>
        <div>
          <h1>Dashboard</h1>
          <span class="header-sub">Métricas de vendas Pix</span>
        </div>
      </div>
      <div class="header-actions">
        <button id="btn-refresh" class="btn btn-secondary">
          <svg class="btn-icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          Atualizar
        </button>
        <button id="btn-export-csv" class="btn btn-secondary">
          <svg class="btn-icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          CSV
        </button>
        <button id="btn-export-json" class="btn btn-secondary">
          <svg class="btn-icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          JSON
        </button>
      </div>
    </header>

    <section id="summary-cards" class="cards-section">
      <div class="card">
        <div class="card-icon card-icon-receita">R$</div>
        <div class="card-value" id="card-receita">0,00</div>
        <div class="card-label">Receita Total</div>
      </div>
      <div class="card">
        <div class="card-icon card-icon-vendas">#</div>
        <div class="card-value" id="card-vendas">0</div>
        <div class="card-label">Vendas</div>
      </div>
      <div class="card">
        <div class="card-icon card-icon-ticket">&empty;</div>
        <div class="card-value" id="card-ticket">0,00</div>
        <div class="card-label">Ticket Médio</div>
      </div>
      <div class="card">
        <div class="card-icon card-icon-upsells">U</div>
        <div class="card-value" id="card-upsells">0</div>
        <div class="card-label">Upsells</div>
      </div>
      <div class="card">
        <div class="card-icon card-icon-nao-id">?</div>
        <div class="card-value" id="card-nao-id">0</div>
        <div class="card-label">Não Identificadas</div>
      </div>
      <div class="card">
        <div class="card-icon card-icon-sem-produto">!</div>
        <div class="card-value" id="card-sem-produto">0</div>
        <div class="card-label">Sem Produto</div>
      </div>
    </section>

    <section id="produtos-section" class="section">
      <h2>Produtos</h2>
      <div id="produtos-list"></div>
    </section>

    <section id="ranking-section" class="section">
      <h2>Ranking</h2>
      <div class="table-wrapper">
        <table id="ranking-table">
          <thead>
            <tr>
              <th>Produto</th>
              <th>Receita</th>
              <th>Vendas</th>
              <th>Upsells</th>
              <th>Não Identificadas</th>
              <th>Ticket Médio</th>
            </tr>
          </thead>
          <tbody id="ranking-body"></tbody>
        </table>
      </div>
    </section>

    <section id="detalhamento-section" class="section">
      <h2>Detalhamento</h2>
      <div id="detalhamento-list"></div>
    </section>

    <footer>
      <a href="#" id="back-link">&larr; Voltar</a>
    </footer>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
