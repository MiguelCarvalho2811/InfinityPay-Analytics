<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - InfinitePay Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-left">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
          </svg>
        </div>
        <h1>Dashboard</h1>
      </div>
      <div class="header-actions">
        <button id="btn-refresh" class="btn btn-secondary">Atualizar</button>
        <button id="btn-export-csv" class="btn btn-secondary">CSV</button>
        <button id="btn-export-json" class="btn btn-secondary">JSON</button>
      </div>
    </header>

    <section id="summary-cards" class="cards-section">
      <div class="card">
        <div class="card-value" id="card-receita">R$ 0,00</div>
        <div class="card-label">Receita Total</div>
      </div>
      <div class="card">
        <div class="card-value" id="card-vendas">0</div>
        <div class="card-label">Vendas</div>
      </div>
      <div class="card">
        <div class="card-value" id="card-ticket">R$ 0,00</div>
        <div class="card-label">Ticket Médio</div>
      </div>
      <div class="card">
        <div class="card-value" id="card-upsells">0</div>
        <div class="card-label">Upsells</div>
      </div>
    </section>

    <section id="produtos-section" class="section">
      <h2>Produtos</h2>
      <div id="produtos-list"></div>
    </section>

    <section id="ranking-section" class="section">
      <h2>Ranking</h2>
      <div class="table-wrapper">
        <table id="ranking-table">
          <thead>
            <tr>
              <th>Produto</th>
              <th>Receita</th>
              <th>Vendas</th>
              <th>Upsells</th>
              <th>Ticket Médio</th>
            </tr>
          </thead>
          <tbody id="ranking-body"></tbody>
        </table>
      </div>
    </section>

    <section id="detalhamento-section" class="section">
      <h2>Detalhamento</h2>
      <div id="detalhamento-list"></div>
    </section>

    <footer>
      <a href="#" id="back-link">Voltar</a>
    </footer>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
