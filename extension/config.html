<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configurações - InfinitePay Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="config.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
        </svg>
      </div>
      <div>
        <h1>Configurações</h1>
        <p class="subtitle">Cadastre seus produtos e chaves Pix</p>
      </div>
    </header>

    <section id="product-list-section">
      <h2>Produtos</h2>
      <div id="product-list" class="product-list"></div>
    </section>

    <section id="product-form-section">
      <h2 id="form-title">Novo Produto</h2>
      <form id="product-form">
        <input type="hidden" id="edit-index" value="-1">

        <div class="form-group">
          <label for="produto-nome">Nome do Produto</label>
          <input type="text" id="produto-nome" placeholder="Ex: Airfryer" required>
        </div>

        <div class="form-group">
          <label for="produto-pix">Final da Chave Pix (4 dígitos)</label>
          <input type="text" id="produto-pix" placeholder="Ex: 1111" maxlength="4" pattern="[0-9]{4}" required>
        </div>

        <div class="form-group">
          <label for="produto-completo">Pacote Completo (R$)</label>
          <input type="number" id="produto-completo" placeholder="Ex: 19.90" step="0.01" min="0" required>
        </div>

        <div class="form-group">
          <label for="produto-basico">Pacote Básico (R$)</label>
          <input type="number" id="produto-basico" placeholder="Ex: 9.90" step="0.01" min="0" required>
        </div>

        <div class="form-group">
          <label for="produto-upcompleto">UpCompleto (R$)</label>
          <input type="number" id="produto-upcompleto" placeholder="Ex: 4.90" step="0.01" min="0" required>
        </div>

        <div class="form-group">
          <label>Upsells (R$)</label>
          <div id="upsell-list"></div>
          <button type="button" id="add-upsell" class="btn btn-small">+ Adicionar Upsell</button>
        </div>

        <div class="form-actions">
          <button type="submit" id="btn-save" class="btn btn-primary">Salvar</button>
          <button type="button" id="btn-cancel" class="btn btn-secondary hidden">Cancelar</button>
        </div>
      </form>
    </section>

    <footer>
      <a href="#" id="back-link">Voltar</a>
    </footer>
  </div>

  <script src="config.js"></script>
</body>
</html>
